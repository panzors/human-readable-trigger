name: Release

# Triggered by GitHub's release functionality: packs the library and publishes
# the NuGet package to both nuget.org and this repo's GitHub Packages feed.
#
# Required configuration:
#   - Secret NUGET_API_KEY: an API key from nuget.org with push permission.
#   - The built-in GITHUB_TOKEN is used for GitHub Packages (no setup needed).
#
# The package version is taken from the release tag (a leading "v" is stripped),
# so tagging a release "v1.2.3" publishes version 1.2.3.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (LTS)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version from release tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack src/HumanReadableTrigger/HumanReadableTrigger.csproj
          --configuration Release
          --no-build
          -p:Version=${{ steps.version.outputs.version }}
          --output artifacts/packages

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate
